<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Times Table Trainer</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Times Table Trainer</h1>
        <p class="subtitle">Solve the multiplication, then check the answer.</p>
      </header>

      <section class="card">
        <div class="number-display" id="number">?</div>
        <div class="answer" id="answer" aria-live="polite">
          Click “Show answer” to reveal the product.
        </div>

        <div class="buttons">
          <button class="action" id="showAnswer">Show answer</button>
          <button class="action secondary" id="newProblem">New problem</button>
        </div>
      </section>

      <footer class="footer">
        <p>Powered by FastAPI &amp; your imagination.</p>
      </footer>
    </main>
  </body>
</html>
